<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agua-VP</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;
        }

        .box {
            width: 400px;
            height: 300px;
            background-color: #7fd1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: Arial, sans-serif;
            flex-direction: column; /* Esto organiza los elementos de forma vertical */
        }

        .spinner {
            border: 4px solid #f3f3f3;
            /* Light gray */
            border-top: 4px solid #3498db;
            /* Blue */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-top: 10px; /* Espacio entre el texto y el spinner */
            display: inline-block;
        }

        /* Animation for the spinner */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .content {
            display: none;
            text-align: center;
        }

        .loading .content {
            display: block;
        }
    </style>
</head>

<body>
    <div class="box loading" id="loadingBox">
        <!-- Main Content -->
        <div class="content">
            <img src="./src/assets/images/logo_login.png" alt="Logo" style="width: 100px; height: auto;">
            <h1>AGUA-VP</h1>
            <!-- Spinner -->
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        // Simulate loading for 5 seconds, then show content
        setTimeout(function () {
            document.getElementById('loadingBox').classList.remove('loading');
        }, 15000);
    </script>
</body>

</html>
