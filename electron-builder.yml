appId: com.electron.app
productName: Agua-vp
directories: # directorio de la aplicación
  buildResources: build
files: # archivos que se incluirán en la aplicación
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
asarUnpack: # archivos que no se empaquetarán en el archivo asar
  - resources/**
  - grafos/**
win:
  executableName: Agua-vp
nsis:
  oneClick: false #se instalará en una carpeta específica
  perMachine: true #instalación para todos los usuarios
  allowElevation: true #permite la elevación de privilegios
  allowToChangeInstallationDirectory: true #permite cambiar el directorio de instalación
  createStartMenuShortcut: true #crea un acceso directo en el menú de inicio
  artifactName: ${name}-${version}-setup.${ext} #nombre del archivo de instalación
  shortcutName: ${productName} #nombre del acceso directo 
  uninstallDisplayName: ${productName} #nombre que se mostrará en el desinstalador
  createDesktopShortcut: always #crea un acceso directo en el escritorio
mac:
  entitlementsInherit: build/entitlements.mac.plist 
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish: 
  provider: github #de provider
  owner: Mahynlo #nombre del propietario del repositorio
  repo: AGUA-VP # nombre del repositorio
  releaseType: release # tipo de lanzamiento
  private: true # si es un repositorio privado
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/ # mirror de descarga de electron para la compilación de la aplicación
